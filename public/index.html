<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 Image Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>S3 Image Vault</h1>
            <p>Upload and view your securely stored images.</p>
        </header>

        <section class="upload-section">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-content">
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p>Drag & Drop your image here</p>
                    <span class="or">or</span>
                    <label for="file-input" class="browse-btn">Browse Files</label>
                    <input type="file" id="file-input" accept="image/png, image/jpeg" hidden>
                </div>
            </div>
            <div id="upload-progress" class="hidden">
                <div class="spinner"></div>
                <p>Uploading to S3...</p>
            </div>
        </section>

        <section class="gallery-section">
            <div class="gallery-header">
                <h2>Recent Uploads</h2>
                <span class="badge">Last 5</span>
            </div>
            <div id="gallery" class="gallery-grid">
                <!-- Skeletons for initial loading -->
                <div class="skeleton-loader"></div>
                <div class="skeleton-loader"></div>
                <div class="skeleton-loader"></div>
            </div>
        </section>
    </div>

    <div id="toast" class="toast">Message</div>

    <script src="app.js"></script>
</body>
</html>
